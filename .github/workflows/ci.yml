name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tooling
        run: python -m pip install --upgrade pytest ruff psutil

      - name: Lint
        run: ruff check .

      # The suite is deliberately GTK-free: it covers the backend seams (pkg,
      # profiles, cleaner, services, metrics), so it needs no display and no
      # PyGObject stack.
      - name: Test
        run: pytest -q

  package:
    name: Build .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper devscripts lintian appstream

      - name: Validate AppStream metainfo
        run: appstreamcli validate data/io.github.rclinux.MintMechanic.metainfo.xml

      - name: Build binary package
        run: ./build-deb.sh

      - name: Lint the binary package
        run: lintian --fail-on warning --tag-display-limit 0 dist/*.deb

      # The PPA uploads a SOURCE package, so a green binary build is not enough
      # to know the upload will succeed. Build and lint it here too.
      - name: Build source package
        run: ./build-source.sh

      - name: Lint the source package
        run: lintian --fail-on warning --tag-display-limit 0 ../mint-mechanic_*_source.changes

      - uses: actions/upload-artifact@v7
        with:
          name: mint-mechanic-deb
          path: dist/*.deb
