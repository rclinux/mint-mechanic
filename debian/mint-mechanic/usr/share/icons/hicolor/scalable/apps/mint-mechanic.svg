<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5AC98A"/>
      <stop offset="1" stop-color="#2A9D63"/>
    </linearGradient>
  </defs>

  <!-- app tile -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bg)"/>

  <!-- gauge dial: a 270° arc drawn as a dashed circle, gap centred at the bottom -->
  <g transform="rotate(135 256 268)">
    <circle cx="256" cy="268" r="150" fill="none" stroke="#ffffff"
            stroke-opacity="0.95" stroke-width="34" stroke-linecap="round"
            stroke-dasharray="706.86 235.62"/>
  </g>

  <!-- tick marks -->
  <g stroke="#ffffff" stroke-opacity="0.9" stroke-width="9" stroke-linecap="round">
    <line x1="171.2" y1="352.9" x2="181.8" y2="342.3"/>
    <line x1="145.1" y1="222.1" x2="159.0" y2="227.8"/>
    <line x1="256.0" y1="148.0" x2="256.0" y2="163.0"/>
    <line x1="366.9" y1="222.1" x2="353.0" y2="227.8"/>
    <line x1="340.9" y1="352.9" x2="330.3" y2="342.3"/>
  </g>

  <!-- needle + hub -->
  <line x1="239.9" y1="287.2" x2="331.8" y2="177.6" stroke="#ffffff"
        stroke-width="20" stroke-linecap="round"/>
  <circle cx="256" cy="268" r="26" fill="#ffffff"/>
  <circle cx="256" cy="268" r="11" fill="#2A9D63"/>
</svg>
